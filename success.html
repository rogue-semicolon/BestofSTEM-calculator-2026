<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Confirmed — Best of STEM Awards 2026</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f9f9f9;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 3rem 2.5rem;
      max-width: 540px;
      width: 100%;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      text-align: center;
    }

    .checkmark {
      width: 64px;
      height: 64px;
      background: #e6f4ea;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      font-size: 2rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.75rem;
      color: #1a1a1a;
    }

    .email-line {
      font-size: 1rem;
      color: #444;
      margin-bottom: 1.5rem;
    }

    .email-line span {
      font-weight: 600;
      color: #1a1a1a;
    }

    .next-step {
      background: #f0f7ff;
      border-radius: 8px;
      padding: 1.25rem 1.5rem;
      margin-bottom: 2rem;
      font-size: 0.95rem;
      color: #1a1a1a;
      line-height: 1.6;
    }

    .contact {
      font-size: 0.875rem;
      color: #666;
    }

    .contact a {
      color: #0057b8;
      text-decoration: none;
    }

    .contact a:hover {
      text-decoration: underline;
    }

    .loading {
      color: #888;
      font-size: 0.9rem;
      margin-top: 1rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="checkmark">✓</div>
    <h1>Payment received.</h1>
    <p class="email-line" id="email-line">Check your inbox for your application link(s).</p>
    <div class="next-step">
      You'll receive one application link per product entered. Each link takes about 5 minutes to complete and goes directly to your assigned educator judges.
    </div>
    <p class="contact">
      Questions? Email <a href="mailto:daylene@catapult-x.com">daylene@catapult-x.com</a>
    </p>
  </div>

  <script>
    async function loadSession() {
      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get('session_id');
      if (!sessionId) return;

      try {
        const res = await fetch(`/api/session?session_id=${sessionId}`);
        if (!res.ok) return;
        const data = await res.json();
        if (data.email) {
          document.getElementById('email-line').innerHTML =
            `A confirmation email is on its way to <span>${data.email}</span>.`;
        }
      } catch (e) {
        // Fail silently — the page works fine without the email display
      }
    }

    loadSession();
  </script>
</body>
</html>
